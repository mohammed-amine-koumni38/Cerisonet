<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
  <div class="card shadow" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">
      <h2 class="card-title text-center mb-4">Connexion</h2>
      <form (ngSubmit)="onSubmit()" #f="ngForm">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="login" name="login" required placeholder="exemple@mail.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Mot de passe</label>
          <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
      </form>
    </div>
  </div>
</div>
